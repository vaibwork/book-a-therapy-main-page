<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Portal redirects: /patient, /practitioner, /clinic forward instantly to their
      // dedicated apps. This runs before the JS bundle loads, so there is no flash.
      // Destinations are injected from VITE_* env at build time
      // (.env.development for local dev, .env.production for live).
      (function () {
        var routes = {
          "/patient": "%VITE_CUSTOMER_URL%/book",
          "/practitioner": "%VITE_PRACTITIONER_URL%/login",
          "/clinic": "%VITE_CLINIC_URL%/clinic-signups",
        };
        var dest = routes[location.pathname.replace(/\/+$/, "")];
        if (dest && dest.charAt(0) !== "%") location.replace(dest);
      })();
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon-48.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#98c454" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Book a Therapy Hub | Portal Selection</title>
    <meta name="description" content="Access the Book a Therapy portals: book sessions as a customer, manage client rosters and schedules as a practitioner, or register and manage your healthcare clinics." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
